<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="icon" href="https://github.com/minyangtech/minyangtech.github.io/blob/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png?raw=true" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민양테크 | 1주년 카운트다운</title>
    
    <meta property="og:title" content="민양테크 1주년 카운트다운">
    <meta property="og:description" content="2026.09.20 민양테크의 새로운 시작까지 남은 시간">
    <meta property="og:image" content="https://github.com/minyang-tech/minyangtech.github.io/blob/main/image%2F%EB%AF%BC%EC%96%91%ED%85%8C%ED%81%AC%20%EB%B0%94%ED%83%95%ED%99%94%EB%A9%B4.png">
    <meta property="og:url" content="https://first.year.minyangtech.n-e.kr">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 폭죽 효과 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #f9f9f9; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); color: var(--txt); 
            transition: 0.3s; line-height: 1.6;
            overflow-x: hidden;
        }

        /* Header */
        header { 
            width: 100%; height: 80px; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 5%; border-bottom: 1px solid var(--brd); 
            background-color: var(--bg); position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo-link img { height: 40px; display: block; }
        
        .nav-links { display: flex; list-style: none; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        /* Dark Mode Switch */
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Main Content */
        main { 
            min-height: calc(100vh - 80px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin-top: 80px; padding: 40px 20px;
        }
        .timer-header { text-align: center; margin-bottom: 50px; }
        .timer-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; letter-spacing: -1px; }
        .timer-header p { opacity: 0.6; font-size: 1.1rem; }

        .timer-card { 
            background: var(--card-bg); 
            border: 1px solid var(--brd); 
            padding: 60px 40px; 
            border-radius: 32px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 800px; width: 100%;
            transition: all 0.5s ease-in-out;
        }
        
        /* Countdown Display */
        .countdown-display {
            font-size: 4rem;
            font-weight: 900;
            font-family: 'Monaco', 'Courier New', monospace;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .countdown-labels {
            display: flex;
            justify-content: center;
            gap: 15px;
            opacity: 0.5;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .countdown-labels span { flex: 1; max-width: 120px; }

        /* YouTube Container */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Footer */
        footer {
            width: 100%; padding: 60px 20px; border-top: 1px solid var(--brd);
            background-color: var(--bg); display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .footer-sns { display: flex; gap: 30px; margin-bottom: 25px; align-items: center; }
        .x-logo-img { height: 24px; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px; color: #FF0000; }
        .footer-email a { text-decoration: none; color: var(--txt); opacity: 0.6; font-size: 14px; }
        .footer-copyright { font-size: 13px; opacity: 0.4; margin-top: 15px; }

        @media (max-width: 768px) {
            .countdown-display { font-size: 2.2rem; }
            .timer-header h1 { font-size: 1.8rem; }
            .nav-links { display: none; } 
            .timer-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://minyangtech.n-e.kr" class="logo-link">
                <img src="https://minyangtech.n-e.kr/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="https://minyangtech.n-e.kr/docs">Docs</a></li>
                    <li><a href="https://minyangtech.n-e.kr/news">News</a></li>
                    <li><a href="https://minyangtech.n-e.kr/apps">Apps</a></li>
                    <li><a href="https://minyangtech.n-e.kr/issues">Issues</a></li>
                    <li><a href="https://minyangtech.n-e.kr/eula">EULA</a></li>
                </ul>
            </nav>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main>
        <section class="timer-header">
            <h1 id="main-title">1st Year Anniversary</h1>
            <p id="sub-title">2026년 9월 20일, 민양테크의 새로운 도약까지</p>
        </section>

        <div class="timer-card" id="timer-card">
            <div id="countdown" class="countdown-display">0000/00/00/00</div>
            <div class="countdown-labels" id="countdown-labels">
                <span>Year</span>
                <span>Month</span>
                <span>Day</span>
                <span>Sec</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-sns">
            <a href="https://x.com/minyang_tech" target="_blank">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img" alt="X">
            </a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
        <div class="footer-email">
            <a href="mailto:support@minyangtech.n-e.kr">support@minyangtech.n-e.kr</a>
        </div>
        <div class="footer-copyright">
            <p>민양테크가 제작한 모든 제품의 저작권은 민양테크에 있습니다.</p>
            <p style="margin-top:5px;">© 2026 Minyang Tech. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // 타겟 날짜 설정 (2026년 9월 20일 14시)
        const targetDate = new Date("September 20, 2026 14:00:00").getTime();
        let isCelebrationStarted = false;

        function triggerCelebration() {
            if (isCelebrationStarted) return;
            isCelebrationStarted = true;

            // 1. UI 텍스트 변경
            document.getElementById("main-title").innerText = "HAPPY 1ST ANNIVERSARY!";
            document.getElementById("sub-title").innerText = "민양테크의 새로운 시작을 함께해주세요.";

            // 2. 카운트다운 숫자를 지우고 유튜브 영상 삽입
            const card = document.getElementById("timer-card");
            card.innerHTML = `
                <div class="video-container">
                    <iframe 
                        src="https://www.youtube.com/embed/H7hbGPBi5ac?autoplay=1&rel=0" 
                        title="Minyang Tech 1st Anniversary" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                    </iframe>
                </div>
            `;

            // 3. 폭죽 효과 무한 재생
            const duration = 15 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                // 무한 재생을 위해 시간 제한 없이 계속 호출하거나, 
                // 특정 간격으로 계속 실행
                confetti(Object.assign({}, defaults, { 
                    particleCount: 50, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount: 50, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 500);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance <= 0) {
                triggerCelebration();
                return;
            }

            const msPerSec = 1000;
            const msPerMin = msPerSec * 60;
            const msPerHour = msPerMin * 60;
            const msPerDay = msPerHour * 24;
            const msPerMonth = msPerDay * 30.44; 
            const msPerYear = msPerDay * 365.25;

            const years = Math.floor(distance / msPerYear);
            const months = Math.floor((distance % msPerYear) / msPerMonth);
            const days = Math.floor((distance % msPerMonth) / msPerDay);
            const seconds = Math.floor((distance % msPerMin) / msPerSec);

            const display = document.getElementById("countdown");
            if(display) {
                display.innerHTML = 
                    `${String(years).padStart(4, '0')}/${String(months).padStart(2, '0')}/${String(days).padStart(2, '0')}/${String(seconds).padStart(2, '0')}`;
            }
        }

        // 1초마다 업데이트
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 다크모드 로직
        const toggle = document.getElementById('dark-mode-toggle');
        function updateTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            toggle.checked = isDark;
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }
        toggle.addEventListener('change', () => updateTheme(toggle.checked));
        window.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('darkMode');
            if (savedMode === 'enabled' || (!savedMode && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                updateTheme(true);
            }
        });
    </script>
</body>
</html>
